apiVersion: apps/v1
kind: Deployment
metadata:
  name: unforked
  namespace: homectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unforked
  template:
    metadata:
      labels:
        app: unforked
    spec:
      containers:
        # ── App ──────────────────────────────────────────────────────────────
        # Pod-local only: all external traffic enters through the auth-proxy
        # sidecar below. Never point the Service or Ingress at port 8080 — the
        # X-Homectl-* identity headers are only trustworthy because clients
        # cannot reach the app directly.
        - name: unforked
          image: rg.fr-par.scw.cloud/homectl/unforked:$IMAGE_TAG
          ports:
            - containerPort: 8080
            # Machine API (docs/aivo-integration.md): API-key auth only, exposed
            # via the unforked-machine Service below — never via any Ingress.
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: unforked-terraform-secrets
            # Web Push VAPID keys (VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY /
            # VAPID_SUBJECT), Terraform-managed in homectl-infra (`vapid = true`
            # on this app). Optional so pods still start before the first
            # terraform apply — the backend just reports push as unavailable.
            - secretRef:
                name: unforked-vapid-secrets
                optional: true
            # Listed last: hand-managed overrides win on key conflicts.
            - secretRef:
                name: unforked-secrets
          env:
            # One-time homectl-auth user import at boot (see docs/deploy.md).
            # Client id + secret come from the Terraform-managed Secret
            # (`auth = true` on this app in homectl-infra).
            - name: INTERNAL_AUTH_URL
              value: http://homectl-auth.homectl
            - name: AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_ID
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_SECRET
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi

        # ── Auth sidecar ─────────────────────────────────────────────────────
        # Owns the OAuth flow against homectl-auth, keeps the session in the
        # encrypted hs_session cookie, injects verified X-Homectl-* headers,
        # and proxies to the app container above.
        - name: auth-proxy
          image: rg.fr-par.scw.cloud/homectl/homectl-auth-proxy:latest
          ports:
            - name: proxy
              containerPort: 4180
          env:
            - name: PUBLIC_AUTH_URL
              value: https://auth.homectl.no
            - name: INTERNAL_AUTH_URL
              value: http://homectl-auth.homectl
            - name: APP_BASE_URL
              value: https://unforked.homectl.no
            - name: UPSTREAM
              value: http://127.0.0.1:8080
            - name: AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_ID
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_SECRET
            - name: COOKIE_KEY
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: COOKIE_KEY
            - name: NODE_ENV
              value: production
          # Do not point readiness at /readyz — it only checks JWKS and becomes
          # ready while the app is still importing users. Probe unforked :8080
          # on the pod loopback so Service traffic waits until import finishes.
          startupProbe:
            exec:
              command:
                - node
                - -e
                - "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            # `node -e` cold-starts a full Node process on every probe; under this
            # container's 25m CPU request that exceeds the 1s exec-probe default and
            # times out before boot finishes. Give it room (< periodSeconds).
            timeoutSeconds: 5
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            timeoutSeconds: 5
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: unforked
  namespace: homectl
spec:
  selector:
    app: unforked
  ports:
    - port: 80
      targetPort: 4180 # → the auth-proxy sidecar, never the app's 8080
---
# Machine API (docs/aivo-integration.md §2): in-cluster clients (Aivo) reach the
# API-key-authenticated listener via http://unforked-machine.homectl. This
# Service is deliberately referenced by NO Ingress, so the machine endpoints are
# unreachable from the internet by construction.
apiVersion: v1
kind: Service
metadata:
  name: unforked-machine
  namespace: homectl
spec:
  selector:
    app: unforked
  ports:
    - port: 80
      targetPort: 8081 # → the machine listener; never 8080 (identity headers) or 4180
---
# Defence in depth for the machine API (docs/aivo-integration.md §4.2).
# NetworkPolicy is additive-deny: selecting the unforked pod drops all
# unselected ingress, so the existing ingress→4180 path must be re-allowed here.
# Port 8080 gets no rule at all — which also closes today's hole where any
# in-cluster pod could hit 8080 directly and forge X-Homectl-* headers.
#
# Before applying, verify on the real cluster (docs/aivo-integration.md §7 O3):
#  - the CNI enforces NetworkPolicy (Kapsule/Cilium does:
#    kubectl get pods -n kube-system | grep -i cilium)
#  - the ingress controller's namespace label matches the selector below
#    (kubectl get ns ingress-nginx --show-labels)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unforked-machine-api
  namespace: homectl
spec:
  podSelector:
    matchLabels:
      app: unforked
  policyTypes: [Ingress]
  ingress:
    # Human traffic: ingress-nginx → auth-proxy sidecar.
    - ports: [{ port: 4180, protocol: TCP }]
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Machine traffic: only Aivo's pods (same namespace) may reach the machine API.
    - ports: [{ port: 8081, protocol: TCP }]
      from:
        - podSelector:
            matchLabels:
              app: aivo
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unforked
  namespace: homectl
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - unforked.homectl.no
      secretName: unforked-tls
  rules:
    - host: unforked.homectl.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unforked
                port:
                  number: 80
