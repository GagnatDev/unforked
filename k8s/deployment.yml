apiVersion: apps/v1
kind: Deployment
metadata:
  name: unforked
  namespace: homectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unforked
  template:
    metadata:
      labels:
        app: unforked
    spec:
      containers:
        - name: unforked
          image: rg.fr-par.scw.cloud/homectl/unforked:$IMAGE_TAG
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: unforked-terraform-secrets
            - secretRef:
                name: unforked-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: unforked
  namespace: homectl
spec:
  selector:
    app: unforked
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unforked
  namespace: homectl
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - unforked.homectl.no
      secretName: unforked-tls
  rules:
    - host: unforked.homectl.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unforked
                port:
                  number: 80
