apiVersion: apps/v1
kind: Deployment
metadata:
  name: unforked
  namespace: homectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unforked
  template:
    metadata:
      labels:
        app: unforked
    spec:
      containers:
        # ── App ──────────────────────────────────────────────────────────────
        # Pod-local only: all external traffic enters through the auth-proxy
        # sidecar below. Never point the Service or Ingress at port 8080 — the
        # X-Homectl-* identity headers are only trustworthy because clients
        # cannot reach the app directly.
        - name: unforked
          image: rg.fr-par.scw.cloud/homectl/unforked:$IMAGE_TAG
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: unforked-secrets
          env:
            # One-time homectl-auth user import at boot (see docs/deploy.md).
            # Client id + secret come from the Terraform-managed Secret
            # (`auth = true` on this app in homectl-infra).
            - name: INTERNAL_AUTH_URL
              value: http://homectl-auth.homectl
            - name: AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_ID
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_SECRET
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi

        # ── Auth sidecar ─────────────────────────────────────────────────────
        # Owns the OAuth flow against homectl-auth, keeps the session in the
        # encrypted hs_session cookie, injects verified X-Homectl-* headers,
        # and proxies to the app container above.
        - name: auth-proxy
          image: rg.fr-par.scw.cloud/homectl/homectl-auth-proxy:latest
          ports:
            - name: proxy
              containerPort: 4180
          env:
            - name: PUBLIC_AUTH_URL
              value: https://auth.homectl.no
            - name: INTERNAL_AUTH_URL
              value: http://homectl-auth.homectl
            - name: APP_BASE_URL
              value: https://unforked.homectl.no
            - name: UPSTREAM
              value: http://127.0.0.1:8080
            - name: AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_ID
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: AUTH_CLIENT_SECRET
            - name: COOKIE_KEY
              valueFrom:
                secretKeyRef:
                  name: unforked-terraform-secrets
                  key: COOKIE_KEY
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: unforked
  namespace: homectl
spec:
  selector:
    app: unforked
  ports:
    - port: 80
      targetPort: 4180 # → the auth-proxy sidecar, never the app's 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unforked
  namespace: homectl
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - unforked.homectl.no
      secretName: unforked-tls
  rules:
    - host: unforked.homectl.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unforked
                port:
                  number: 80
