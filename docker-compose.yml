services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meals
      POSTGRES_PASSWORD: meals
      POSTGRES_DB: meals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meals -d meals"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # DATABASE_URL is the primary var; the legacy jdbc: DB_URL is still accepted.
      - DATABASE_URL=postgresql://meals:meals@postgres:5432/meals
      - PORT=8080
      - SEED_TEST_DATA=true
      - JWT_SECRET=test-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
