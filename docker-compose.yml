services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meals
      POSTGRES_PASSWORD: meals
      POSTGRES_DB: meals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meals -d meals"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/meals
      - DB_USER=meals
      - DB_PASSWORD=meals
      - PORT=8080
      - SEED_TEST_DATA=true
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
