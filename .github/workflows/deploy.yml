name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-k8s
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Build and push image
        run: |
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud \
            -u nologin --password-stdin
          docker build -t rg.fr-par.scw.cloud/homectl/unforked:${{ github.sha }} \
                       -t rg.fr-par.scw.cloud/homectl/unforked:latest .
          docker push rg.fr-par.scw.cloud/homectl/unforked:${{ github.sha }}
          docker push rg.fr-par.scw.cloud/homectl/unforked:latest

      - name: Setup Scaleway CLI and get kubeconfig
        uses: scaleway/action-scw@v0
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          args: k8s kubeconfig install ${{ secrets.K8S_CLUSTER_ID }} region=fr-par

      - name: Deploy to cluster
        run: |
          sed -i "s|\$IMAGE_TAG|${{ github.sha }}|g" k8s/deployment.yml
          kubectl apply -f k8s/deployment.yml
          kubectl rollout status deployment/unforked -n homectl --timeout=300s
