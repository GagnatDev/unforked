ktor {
    deployment {
        host = "0.0.0.0"
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ app.meals.ApplicationKt.module ]
    }
}

storage {
    db {
        url = "jdbc:postgresql://localhost:5432/meals"
        url = ${?DB_URL}
        user = "meals"
        user = ${?DB_USER}
        password = "meals"
        password = ${?DB_PASSWORD}
    }
}

cors {
    allowedOrigin = "http://localhost:3000"
    allowedOrigin = ${?CORS_ORIGIN}
}

auth {
    jwt {
        secret = "change-me-in-production-use-env"
        secret = ${?JWT_SECRET}
        issuer = "app.meals"
        issuer = ${?JWT_ISSUER}
        audience = "app.meals"
        audience = ${?JWT_AUDIENCE}
    }
    disabled = false
    disabled = ${?DISABLE_AUTH}
}

seed {
    testData = "false"
    testData = ${?SEED_TEST_DATA}
}
