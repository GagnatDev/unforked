<!DOCTYPE html>
<html lang="no">
<head><title>Birria taco | Oppskrift</title></head>
<body>
<h1>Birria taco</h1>
<div>
  <h2>Ingredienser</h2>
  <ul>
    <li>ca. 1 kg benfri høyrygg av storfekjøtt</li>
    <li>1 ts salt</li>
    <li>2 ss nøytral olje til steking</li>
  </ul>
</div>
<div>
  <h2>Slik gjør du</h2>
  <ol>
    <li>Skjær kjøttet i store biter, og krydre med salt og pepper.</li>
    <li>Rens løk og hvitløk.</li>
    <li>Ha kjøttet tilbake i gryta.</li>
  </ol>
</div>
</body>
</html>
