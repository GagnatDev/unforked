<!DOCTYPE html>
<html lang="no">
<head><title>Lange med kikertsalat | Oppskrift</title></head>
<body>
<h1>Lange med kikertsalat</h1>
<div>
  <h2>Ingredienser</h2>
  <ul>
    <li>800 g benfri langefilet eller annen hvit fisk</li>
    <li>0,5 ts salt</li>
    <li>200 g fullkornsnudler</li>
  </ul>
</div>
<div>
  <h2>Slik gjør du</h2>
  <ol>
    <li>Forvarm stekeovnen til 140 °C.</li>
    <li>Tørk langefilet med kjøkkenpapir og krydre med salt og pepper.</li>
    <li>Kok nudler etter anvisning på pakken.</li>
  </ol>
</div>
</body>
</html>
