<!DOCTYPE html>
<html lang="no">
<head><title>Grove pannekaker | Oppskrift</title></head>
<body>
<h1>Grove pannekaker</h1>
<div>
  <h2>Ingredienser</h2>
  <ul>
    <li>1,5 dl hvetemel</li>
    <li>1,5 dl fin sammalt hvete</li>
    <li>0,5 ts salt</li>
    <li>5 dl melk</li>
    <li>4 stk. egg</li>
    <li>1 ss margarin til steking</li>
  </ul>
</div>
<div>
  <h2>Slik gjør du</h2>
  <ol>
    <li>Bland mel og salt. Tilsett omtrent halvparten av melken.</li>
    <li>Stek pannekakene i litt margarin på forholdsvis sterk varme.</li>
  </ol>
</div>
</body>
</html>
